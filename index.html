<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Kalpataru Limited — AR Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    :root {
      --font: 'Outfit', system-ui, sans-serif;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --teal: #0d4f4f;
      --teal-light: #1a7373;
      --gold: #c9a84c;
      --gold-soft: rgba(201, 168, 76, 0.35);
      --glass: rgba(8, 32, 32, 0.82);
      --glass-border: rgba(201, 168, 76, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #000;
    }

    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .a-canvas {
      width: 100% !important;
      height: 100% !important;
    }

    #target-status {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 340px;
      width: calc(100% - 32px);
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--teal) 0%, #062e2e 100%);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 999px;
      box-shadow: 0 8px 28px rgba(13, 79, 79, 0.55);
      z-index: 9999;
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #target-status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse-dot 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    #target-status.hidden { display: none; }

    /* ── Social bar (bottom) ── */
    #social-bar {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 9998;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
    }
    #social-bar.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.03em;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .social-link:hover { transform: translateY(-2px); }
    .social-link.insta {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      box-shadow: 0 8px 22px rgba(131, 58, 180, 0.4);
    }
    .social-link.web {
      background: linear-gradient(135deg, var(--teal-light), var(--teal));
      box-shadow: 0 8px 22px rgba(13, 79, 79, 0.45);
    }
    .social-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    #video-audio-toggle {
      position: fixed;
      bottom: 78px;
      left: 50%;
      transform: translateX(-50%);
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: #fff;
      font-family: var(--font);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.03em;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      z-index: 9999;
      display: none;
      backdrop-filter: blur(10px);
      cursor: pointer;
      user-select: none;
    }
    #video-audio-toggle.visible { display: block; }
  </style>
</head>
<body>
  <div id="target-status">Point camera at Kalpataru card</div>

  <div id="social-bar" aria-hidden="true">
    <a class="social-link insta" href="https://www.instagram.com/kalpatarulimited/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      <span class="label">Instagram</span>
    </a>
    <a class="social-link web" href="https://www.kalpataru.com/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      <span class="label">Website</span>
    </a>
  </div>

  <button id="video-audio-toggle" type="button" aria-label="Toggle video sound">Mute video</button>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets timeout="60000">
      <video
        id="reel-vid"
        src="kalpataru-reel.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
      <canvas id="amenities-canvas" width="480" height="640"></canvas>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target-0" mindar-image-target="targetIndex: 0">
      <!-- Reel replaces card overlay — flat on detected marker -->
      <a-video
        class="ar-layer"
        id="reel-video"
        src="#reel-vid"
        position="0 0 0.02"
        width="1"
        height="0.775"
        material="opacity: 0; transparent: true"
        animation__in="property: material.opacity; from: 0; to: 1; dur: 1000; easing: easeInOutSine; fill: forwards; startEvents: playIn"
      ></a-video>

      <!-- Left: building render -->
      <a-image
        class="ar-layer"
        id="building-img"
        src="building.jpg"
        position="0 0 -0.1"
        width="0.42"
        height="0.54"
        material="opacity: 0"
        animation__opacity="property: material.opacity; from: 0; to: 1; dur: 1400; easing: easeInOutSine; fill: forwards; startEvents: playIn"
        animation__position="property: position; from: 0 0 -0.1; to: -0.82 0 0.05; dur: 1400; easing: easeInOutSine; fill: forwards; startEvents: playIn"
      ></a-image>

      <!-- Right: amenities panel (3D canvas texture) -->
      <a-image
        class="ar-layer"
        id="amenities-img"
        src="#amenities-canvas"
        position="0 0 -0.1"
        width="0.42"
        height="0.56"
        material="opacity: 0"
        animation__opacity="property: material.opacity; from: 0; to: 1; dur: 1400; easing: easeInOutSine; fill: forwards; startEvents: playIn"
        animation__position="property: position; from: 0 0 -0.1; to: 0.82 0 0.05; dur: 1400; easing: easeInOutSine; fill: forwards; startEvents: playIn"
      ></a-image>
    </a-entity>
  </a-scene>

  <script>
    var AMENITIES = [
      { icon: '🏋️', label: 'Gymnasium' },
      { icon: '🏛️', label: 'Clubhouse' },
      { icon: '💦', label: 'Kids Pool' },
      { icon: '🌿', label: 'Landscaped Garden' },
      { icon: '🎬', label: 'Mini-Theatre' },
      { icon: '🎱', label: 'Pool Table Room' },
      { icon: '🏊', label: 'Swimming Pools & Sunken Lounger Area' },
      { icon: '🎵', label: 'Music Room' }
    ];

    var CARD_W = 1;
    var CARD_H = 831 / 1072;
    var SIDE_MAX = 0.58;
    var savedVideoTime = 0;

    var statusEl = document.getElementById('target-status');
    var socialBar = document.getElementById('social-bar');
    var audioBtn = document.getElementById('video-audio-toggle');
    var targetEl = document.getElementById('target-0');
    var reelVid = document.getElementById('reel-vid');
    var reelVideoEl = document.getElementById('reel-video');
    var amenitiesCanvas = document.getElementById('amenities-canvas');
    var amenitiesImgEl = document.getElementById('amenities-img');

    var layerFromPositions = {
      'reel-video': '0 0 0.02',
      'building-img': '0 0 -0.1',
      'amenities-img': '0 0 -0.1'
    };

    function drawAmenitiesCanvas() {
      if (!amenitiesCanvas) return;
      var ctx = amenitiesCanvas.getContext('2d');
      var w = amenitiesCanvas.width;
      var h = amenitiesCanvas.height;
      var pad = 22;

      ctx.clearRect(0, 0, w, h);

      // Background
      var bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, 'rgba(8, 32, 32, 0.96)');
      bg.addColorStop(1, 'rgba(6, 46, 46, 0.96)');
      roundRect(ctx, 0, 0, w, h, 18);
      ctx.fillStyle = bg;
      ctx.fill();

      // Gold border
      ctx.strokeStyle = 'rgba(201, 168, 76, 0.55)';
      ctx.lineWidth = 3;
      roundRect(ctx, 2, 2, w - 4, h - 4, 16);
      ctx.stroke();

      // Title
      ctx.fillStyle = '#c9a84c';
      ctx.font = '700 28px Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Premium', w / 2, pad + 28);
      ctx.fillText('Amenities', w / 2, pad + 58);

      ctx.strokeStyle = 'rgba(201, 168, 76, 0.35)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad, pad + 72);
      ctx.lineTo(w - pad, pad + 72);
      ctx.stroke();

      // List items
      var y = pad + 98;
      var rowH = 58;
      AMENITIES.forEach(function (item) {
        // Icon box
        roundRect(ctx, pad, y - 18, 36, 36, 9);
        var iconBg = ctx.createLinearGradient(pad, y - 18, pad + 36, y + 18);
        iconBg.addColorStop(0, '#1a7373');
        iconBg.addColorStop(1, '#0d4f4f');
        ctx.fillStyle = iconBg;
        ctx.fill();
        ctx.strokeStyle = 'rgba(201, 168, 76, 0.4)';
        ctx.lineWidth = 1;
        roundRect(ctx, pad, y - 18, 36, 36, 9);
        ctx.stroke();

        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(item.icon, pad + 18, y + 6);

        // Label
        ctx.fillStyle = 'rgba(255, 255, 255, 0.93)';
        ctx.font = '500 17px Outfit, sans-serif';
        ctx.textAlign = 'left';
        wrapText(ctx, item.label, pad + 48, y + 4, w - pad * 2 - 48, 20);
        y += rowH;
      });

      refreshCanvasTexture(amenitiesImgEl);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      var words = text.split(' ');
      var line = '';
      var lines = [];
      words.forEach(function (word) {
        var test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);
      lines.forEach(function (ln, i) {
        ctx.fillText(ln, x, y + i * lineHeight);
      });
    }

    function refreshCanvasTexture(el) {
      if (!el) return;
      var mesh = el.getObject3D('mesh');
      if (mesh && mesh.material && mesh.material.map) {
        mesh.material.map.needsUpdate = true;
      }
    }

    function setAspectRatio(el, maxSize) {
      var src = el.getAttribute('src');
      if (!src) return;
      var fullSrc = new URL(src, window.location.href).href;
      var img = new Image();
      img.onload = function () {
        var w = img.naturalWidth;
        var h = img.naturalHeight;
        var width, height;
        if (w >= h) {
          width = maxSize;
          height = maxSize * (h / w);
        } else {
          height = maxSize;
          width = maxSize * (w / h);
        }
        el.setAttribute('width', width);
        el.setAttribute('height', height);
      };
      img.src = fullSrc;
    }

    function setCardVideoFit() {
      if (!reelVideoEl || !reelVid) return;
      var w = reelVid.videoWidth;
      var h = reelVid.videoHeight;
      if (!w || !h) return;
      var cardAspect = CARD_W / CARD_H;
      var videoAspect = w / h;
      var width, height;
      // Cover the card area (like replacing the printed card)
      if (videoAspect > cardAspect) {
        height = CARD_H;
        width = CARD_H * videoAspect;
      } else {
        width = CARD_W;
        height = CARD_W / videoAspect;
      }
      reelVideoEl.setAttribute('width', width);
      reelVideoEl.setAttribute('height', height);
      reelVideoEl.setAttribute('position', '0 0 0.02');
    }

    function setCanvasAspectRatio(el, canvasEl, maxSize) {
      if (!el || !canvasEl) return;
      var w = canvasEl.width;
      var h = canvasEl.height;
      var width, height;
      if (w >= h) {
        width = maxSize;
        height = maxSize * (h / w);
      } else {
        height = maxSize;
        width = maxSize * (w / h);
      }
      el.setAttribute('width', width);
      el.setAttribute('height', height);
    }

    document.querySelector('a-scene').addEventListener('loaded', function () {
      drawAmenitiesCanvas();
      setAspectRatio(document.getElementById('building-img'), SIDE_MAX);
      setCanvasAspectRatio(amenitiesImgEl, amenitiesCanvas, SIDE_MAX);
      if (reelVid.readyState >= 1) setCardVideoFit();
      else reelVid.addEventListener('loadedmetadata', setCardVideoFit, { once: true });
    });

    function playVideoWithSound() {
      if (!reelVid) return;
      reelVid.muted = false;
      reelVid.volume = 1;
      try { reelVid.currentTime = savedVideoTime || 0; } catch (e) {}
      var playPromise = reelVid.play();
      if (playPromise && playPromise.catch) {
        playPromise.catch(function () {
          // Mobile may block unmuted autoplay — fall back to muted, show toggle
          reelVid.muted = true;
          reelVid.play();
          if (audioBtn) audioBtn.textContent = 'Unmute video';
        });
      }
      if (audioBtn) audioBtn.textContent = reelVid.muted ? 'Unmute video' : 'Mute video';
    }

    function pauseVideo() {
      if (!reelVid) return;
      try { savedVideoTime = reelVid.currentTime || 0; } catch (e) {}
      try { reelVid.pause(); } catch (e) {}
    }

    function resetLayers() {
      targetEl.querySelectorAll('.ar-layer').forEach(function (el) {
        var id = el.getAttribute('id');
        if (layerFromPositions[id]) {
          el.setAttribute('position', layerFromPositions[id]);
          el.setAttribute('material', 'opacity', 0);
        }
      });
    }

    function playLayerAnimations() {
      targetEl.querySelectorAll('.ar-layer').forEach(function (el) {
        el.emit('playIn');
      });
    }

    function showUI() {
      statusEl.classList.add('hidden');
      socialBar.classList.add('visible');
      socialBar.setAttribute('aria-hidden', 'false');
      audioBtn.classList.add('visible');
    }

    function hideUI() {
      statusEl.classList.remove('hidden');
      socialBar.classList.remove('visible');
      socialBar.setAttribute('aria-hidden', 'true');
      audioBtn.classList.remove('visible');
    }

    targetEl.addEventListener('targetFound', function () {
      showUI();
      resetLayers();
      setTimeout(playLayerAnimations, 40);
      setCardVideoFit();
      drawAmenitiesCanvas();
      playVideoWithSound();
    });

    targetEl.addEventListener('targetLost', function () {
      hideUI();
      pauseVideo();
      resetLayers();
    });

    audioBtn.addEventListener('click', function () {
      if (!reelVid) return;
      reelVid.muted = !reelVid.muted;
      reelVid.volume = 1;
      audioBtn.textContent = reelVid.muted ? 'Unmute video' : 'Mute video';
      reelVid.play();
    });
  </script>
</body>
</html>
